<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Diagnostic Tool</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      color: #4ade80;
      margin-bottom: 30px;
    }
    .sprite-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .sprite-card {
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .sprite-card.error {
      border-color: #ef4444;
    }
    .sprite-card.warning {
      border-color: #eab308;
    }
    .sprite-card.ok {
      border-color: #22c55e;
    }
    .sprite-preview {
      width: 128px;
      height: 128px;
      margin: 10px auto;
      background: 
        repeating-conic-gradient(#444 0% 25%, #333 0% 50%) 
        50% / 20px 20px;
      border: 1px solid #666;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .sprite-preview img {
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .sprite-name {
      font-weight: bold;
      color: #4ade80;
      margin-bottom: 5px;
    }
    .sprite-info {
      font-size: 11px;
      color: #999;
      margin: 3px 0;
    }
    .sprite-status {
      margin-top: 10px;
      padding: 5px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .status-error {
      background: #7f1d1d;
      color: #fca5a5;
    }
    .status-warning {
      background: #713f12;
      color: #fde047;
    }
    .status-ok {
      background: #14532d;
      color: #86efac;
    }
    .summary {
      background: #2a2a2a;
      border: 2px solid #4ade80;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
    }
    .summary h2 {
      margin-top: 0;
      color: #4ade80;
    }
    .issue-list {
      list-style: none;
      padding: 0;
    }
    .issue-list li {
      padding: 8px;
      margin: 5px 0;
      border-left: 4px solid;
      padding-left: 12px;
    }
    .issue-list li.error {
      border-color: #ef4444;
      background: #7f1d1d33;
    }
    .issue-list li.warning {
      border-color: #eab308;
      background: #713f1233;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 Fallen Empire - Sprite Diagnostic Tool</h1>
    
    <div class="summary">
      <h2>Diagnostic Summary</h2>
      <div id="summary-content">Analyzing sprites...</div>
    </div>

    <h2>Sprite Analysis</h2>
    <div class="sprite-grid" id="sprite-grid"></div>
  </div>

  <script>
    const SPRITES = {
      'Units': [
        { name: 'Infantry', path: '/sprites/units/infantry.png', expectedAlpha: true },
        { name: 'Cavalry', path: '/sprites/units/cavalry.png', expectedAlpha: true },
        { name: 'Archer', path: '/sprites/units/archer.png', expectedAlpha: true },
        { name: 'Builder', path: '/sprites/units/builder.png', expectedAlpha: true },
      ],
      'Buildings': [
        { name: 'Farm', path: '/sprites/buildings/farm.png', expectedAlpha: true },
        { name: 'Factory', path: '/sprites/buildings/factory.png', expectedAlpha: true },
        { name: 'Silo', path: '/sprites/buildings/silo.png', expectedAlpha: true },
        { name: 'Barracks', path: '/sprites/buildings/barracks.png', expectedAlpha: true },
        { name: 'Scout', path: '/sprites/buildings/scout.png', expectedAlpha: true },
        { name: 'Wall', path: '/sprites/buildings/wall.png', expectedAlpha: true },
        { name: 'Market', path: '/sprites/buildings/market.png', expectedAlpha: true },
      ],
      'Entities': [
        { name: 'City', path: '/sprites/entities/city.png', expectedAlpha: true },
        { name: 'Village', path: '/sprites/entities/village.png', expectedAlpha: true },
        { name: 'Hero', path: '/sprites/entities/hero.png', expectedAlpha: true },
      ],
    };

    const issues = [];
    let totalSprites = 0;
    let loadedSprites = 0;

    async function analyzeSprite(sprite) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          let hasAlpha = false;
          let hasTransparency = false;
          let minAlpha = 255;
          let maxAlpha = 0;
          let opaquePixels = 0;
          let transparentPixels = 0;
          let semiTransparentPixels = 0;
          
          for (let i = 3; i < data.length; i += 4) {
            const alpha = data[i];
            minAlpha = Math.min(minAlpha, alpha);
            maxAlpha = Math.max(maxAlpha, alpha);
            
            if (alpha < 255) {
              hasAlpha = true;
              if (alpha === 0) {
                transparentPixels++;
                hasTransparency = true;
              } else {
                semiTransparentPixels++;
              }
            } else {
              opaquePixels++;
            }
          }
          
          const totalPixels = data.length / 4;
          const transparencyPercent = ((transparentPixels + semiTransparentPixels) / totalPixels * 100).toFixed(1);
          
          resolve({
            width: img.width,
            height: img.height,
            hasAlpha,
            hasTransparency,
            minAlpha,
            maxAlpha,
            opaquePixels,
            transparentPixels,
            semiTransparentPixels,
            transparencyPercent,
            totalPixels,
          });
        };
        
        img.onerror = () => {
          resolve({ error: 'Failed to load' });
        };
        
        img.src = sprite.path;
      });
    }

    async function runDiagnostics() {
      const grid = document.getElementById('sprite-grid');
      
      for (const [category, sprites] of Object.entries(SPRITES)) {
        for (const sprite of sprites) {
          totalSprites++;
          const card = document.createElement('div');
          card.className = 'sprite-card';
          card.innerHTML = `
            <div class="sprite-name">${sprite.name}</div>
            <div class="sprite-preview">
              <img src="${sprite.path}" alt="${sprite.name}" />
            </div>
            <div class="sprite-info">Category: ${category}</div>
            <div class="sprite-info" id="info-${sprite.name}">Analyzing...</div>
            <div class="sprite-status" id="status-${sprite.name}">⏳ Loading...</div>
          `;
          grid.appendChild(card);
          
          const analysis = await analyzeSprite(sprite);
          loadedSprites++;
          
          const infoEl = document.getElementById(`info-${sprite.name}`);
          const statusEl = document.getElementById(`status-${sprite.name}`);
          
          if (analysis.error) {
            card.className = 'sprite-card error';
            infoEl.innerHTML = `<span style="color: #ef4444;">ERROR: ${analysis.error}</span>`;
            statusEl.className = 'sprite-status status-error';
            statusEl.textContent = '❌ FAILED TO LOAD';
            issues.push({ type: 'error', sprite: sprite.name, message: `Failed to load sprite` });
          } else {
            infoEl.innerHTML = `
              Size: ${analysis.width}x${analysis.height}<br>
              Alpha: ${analysis.hasAlpha ? 'Yes' : 'NO'}<br>
              Transparency: ${analysis.transparencyPercent}%<br>
              Opaque: ${analysis.opaquePixels} | Trans: ${analysis.transparentPixels} | Semi: ${analysis.semiTransparentPixels}
            `;
            
            let status = 'ok';
            let statusText = '✅ OK';
            let statusClass = 'status-ok';
            
            // Check for issues
            if (!analysis.hasAlpha || !analysis.hasTransparency) {
              status = 'error';
              statusText = '❌ NO ALPHA CHANNEL';
              statusClass = 'status-error';
              issues.push({ 
                type: 'error', 
                sprite: sprite.name, 
                message: `Missing alpha channel - will render with solid background` 
              });
            } else if (analysis.transparencyPercent < 10) {
              status = 'warning';
              statusText = '⚠️ LOW TRANSPARENCY';
              statusClass = 'status-warning';
              issues.push({ 
                type: 'warning', 
                sprite: sprite.name, 
                message: `Only ${analysis.transparencyPercent}% transparent pixels - might have visible borders` 
              });
            } else if (analysis.width !== 64 || analysis.height !== 64) {
              status = 'warning';
              statusText = '⚠️ UNEXPECTED SIZE';
              statusClass = 'status-warning';
              issues.push({ 
                type: 'warning', 
                sprite: sprite.name, 
                message: `Size is ${analysis.width}x${analysis.height}, expected 64x64` 
              });
            }
            
            card.className = `sprite-card ${status}`;
            statusEl.className = `sprite-status ${statusClass}`;
            statusEl.textContent = statusText;
          }
          
          updateSummary();
        }
      }
    }

    function updateSummary() {
      const summaryEl = document.getElementById('summary-content');
      const errors = issues.filter(i => i.type === 'error');
      const warnings = issues.filter(i => i.type === 'warning');
      
      let html = `
        <p><strong>Progress:</strong> ${loadedSprites} / ${totalSprites} sprites analyzed</p>
        <p><strong>Issues Found:</strong> ${errors.length} errors, ${warnings.length} warnings</p>
      `;
      
      if (issues.length > 0) {
        html += '<ul class="issue-list">';
        for (const issue of issues) {
          html += `<li class="${issue.type}"><strong>${issue.sprite}:</strong> ${issue.message}</li>`;
        }
        html += '</ul>';
      } else if (loadedSprites === totalSprites) {
        html += '<p style="color: #22c55e; font-weight: bold;">✅ All sprites look good!</p>';
      }
      
      summaryEl.innerHTML = html;
    }

    runDiagnostics();
  </script>
</body>
</html>
